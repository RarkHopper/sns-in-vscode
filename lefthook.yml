pre-commit:
  parallel: true
  commands:
    format:
      glob: '**/*.{cjs,json,md,mjs,ts,yaml,yml}'
      run: corepack pnpm exec biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    lint:
      run: corepack pnpm lint
    typecheck:
      run: corepack pnpm typecheck

pre-push:
  commands:
    test:
      run: corepack pnpm test
    build:
      run: corepack pnpm build
